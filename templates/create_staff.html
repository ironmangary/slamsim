<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Other Staff</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="container">
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

    <div class="container mt-5">
        <h1>Create Other Staff</h1>
        <form action="/create_staff" method="POST">
            <!-- Staff Name -->
            <div class="mb-3">
                <label for="staff_name" class="form-label">Staff Name (required)</label>
                <input type="text" class="form-control" id="staff_name" name="staff_name" required>
            </div>
            <!-- Role -->
            <div class="mb-3">
                <label for="role" class="form-label">Role</label>
                <select class="form-select" id="role" name="role">
                    <option value="announcer">Announcer</option>
                    <option value="referee">Referee</option>
                    <option value="manager">Manager</option>
                    <option value="commentator">Commentator</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <!-- League -->
            <div class="mb-3">
                <label for="league" class="form-label">League</label>
                <input type="text" class="form-control" id="league" name="league">
            </div>
            <!-- Biography -->
            <div class="mb-3">
                <label for="biography" class="form-label">Biography</label>
                <textarea class="form-control" id="biography" name="biography" rows="4"></textarea>
            </div>
            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary">Create Staff</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
