<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Wrestler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="container">
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

    <div class="container mt-5">
        <h1>Create Wrestler</h1>
        <form action="/create_wrestler" method="POST" enctype="multipart/form-data">
            <!-- Name -->
            <div class="mb-3">
                <label for="name" class="form-label">Name (required)</label>
                <input type="text" class="form-control" id="name" name="name" maxlength="60" required>
            </div>
            <!-- Nickname -->
            <div class="mb-3">
                <label for="nickname" class="form-label">Nickname</label>
                <input type="text" class="form-control" id="nickname" name="nickname" maxlength="60">
            </div>
            <!-- Height -->
            <div class="mb-3">
                <label for="height" class="form-label">Height</label>
                <input type="text" class="form-control" id="height" name="height" maxlength="10">
            </div>
            <!-- Weight -->
            <div class="mb-3">
                <label for="weight" class="form-label">Weight</label>
                <input type="text" class="form-control" id="weight" name="weight" maxlength="10">
            </div>
            <!-- Gender -->
            <div class="mb-3">
                <label for="gender" class="form-label">Gender (required)</label>
                <select class="form-select" id="gender" name="gender" required>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    </select>
            </div>
            
            <!-- Location -->
            <div class="mb-3">
                <label for="location" class="form-label">Location</label>
                <input type="text" class="form-control" id="location" name="location">
            </div>
            <!-- Image -->
            <div class="mb-3">
                <label for="image" class="form-label">Image</label>
                <input type="file" class="form-control" id="image" name="image">
            </div>
            <!-- League -->
            <div class="mb-3">
                <label for="league" class="form-label">League</label>
        <select name="league" id="league">
            <option value="None">None</option>
            {% for league in leagues %}
                <option value="{{ league.id }}">{{ league.name }}</option>
            {% endfor %}
        </select>
            </div>
            <!-- Division -->
            <div class="mb-3">
                <label for="division" class="form-label">Division</label>
                <input type="text" class="form-control" id="division" name="division">
            </div>
            <!-- Championship -->
            <div class="mb-3">
                <label for="championship" class="form-label">Championship (Read Only)</label>
                <input type="text" class="form-control" id="championship" name="championship" readonly>
            </div>
            <!-- Alignment -->
            <div class="mb-3">
                <label for="alignment" class="form-label">Alignment (required)</label>
                <select class="form-select" id="alignment" name="alignment" required>
                    <option value="face">Face</option>
                    <option value="neutral">Neutral</option>
                    <option value="heel">Heel</option>
                </select>
            </div>
            <!-- Style -->
            <div class="mb-3">
                <label for="style" class="form-label">Style</label>
                <select class="form-select" id="style" name="style">
                    <option value="Brawler">Brawler</option>
                    <option value="Technician">Technician</option>
                    <option value="Arial">Arial</option>
                    <option value="All-Rounder">All-Rounder</option>
                    <option value="Dirty">Dirty</option>
                </select>
            </div>
            <!-- Card Level -->
            <div class="mb-3">
                <label for="card_level" class="form-label">Card Level (required)</label>
                <select class="form-select" id="card_level" name="card_level" required>
                    <option value="Main Eventer">Main Eventer</option>
                    <option value="Upper Card">Upper Card</option>
                    <option value="Mid Card">Mid Card</option>
                    <option value="Jobber">Jobber</option>
                </select>
            </div>
            <!-- Manager -->
            <div class="mb-3">
                <label for="manager" class="form-label">Manager</label>
                <input type="text" class="form-control" id="manager" name="manager">
            </div>
            <!-- Current Tag Team -->
            <div class="mb-3">
                <label for="tagteam" class="form-label">Current Tag Team</label>
                <input type="text" class="form-control" id="tagteam" name="tag_team">
            </div>
            <!-- Current Faction -->
            <div class="mb-3">
                <label for="faction" class="form-label">Current Faction</label>
                <input type="text" class="form-control" id="faction" name="faction">
            </div>
            <!-- Moves -->
            <h3>Moves</h3>
            <!-- Finisher 1 -->
            <div class="mb-3">
                <label for="finisher1" class="form-label">Finisher 1 (required)</label>
                <input type="text" class="form-control" id="finisher1" name="finisher1" maxlength="100" required>
            </div>
            <!-- Finisher 2 -->
            <div class="mb-3">
                <label for="finisher2" class="form-label">Finisher 2</label>
                <input type="text" class="form-control" id="finisher2" name="finisher2" maxlength="100">
            </div>
            <!-- Finisher 3 -->
            <div class="mb-3">
                <label for="finisher3" class="form-label">Finisher 3</label>
                <input type="text" class="form-control" id="finisher3" name="finisher3" maxlength="100">
            </div>
            <!-- Standard 1 -->
            <div class="mb-3">
                <label for="standard1" class="form-label">Standard Move 1 (required)</label>
                <input type="text" class="form-control" id="standard1" name="standard1" maxlength="100" required>
            </div>
            <!-- Standard 2 -->
            <div class="mb-3">
                <label for="standard2" class="form-label">Standard Move 2 (required)</label>
                <input type="text" class="form-control" id="standard2" name="standard2" maxlength="100" required>
            </div>
            <!-- Standard 3 -->
            <div class="mb-3">
                <label for="standard3" class="form-label">Standard Move 3</label>
                <input type="text" class="form-control" id="standard3" name="standard3" maxlength="100">
            </div>
            <!-- Standard 4 -->
            <div class="mb-3">
                <label for="standard4" class="form-label">Standard Move 4</label>
                <input type="text" class="form-control" id="standard4" name="standard4" maxlength="100">
            </div>
            <!-- Standard 5 -->
            <div class="mb-3">
                <label for="standard5" class="form-label">Standard Move 5</label>
                <input type="text" class="form-control" id="standard5" name="standard5" maxlength="100">
            </div>
            <!-- Extreme Moves -->
            <h3>Extreme Moves</h3>
            <!-- Extreme 1 -->
            <div class="mb-3">
                <label for="extreme1" class="form-label">Extreme Move 1</label>
                <input type="text" class="form-control" id="extreme1" name="extreme1" maxlength="100">
            </div>
            <!-- Extreme 2 -->
            <div class="mb-3">
                <label for="extreme2" class="form-label">Extreme Move 2</label>
                <input type="text" class="form-control" id="extreme2" name="extreme2" maxlength="100">
            </div>
            <!-- Extreme 3 -->
            <div class="mb-3">
                <label for="extreme3" class="form-label">Extreme Move 3</label>
                <input type="text" class="form-control" id="extreme3" name="extreme3" maxlength="100">
            </div>
            
            <!-- Status -->
            <div class="mb-3">
                <label for="status" class="form-label">Status (required)</label>
                <select class="form-select" id="status" name="status" required>
                    <option value="active">Active</option>
                    <option value="injured">Injured</option>
                    <option value="suspended">Suspended</option>
                    <option value="inactive">Inactive (No reason specified)</option>
                    </select>
            </div>
            
            <!-- Bio -->
            <div class="mb-3">
                <label for="bio" class="form-label">Biography</label>
                <textarea class="form-control" id="bio" name="bio" rows="4"></textarea>
            </div>
            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary">Create Wrestler</button>
        </form>
    </div>
