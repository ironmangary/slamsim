<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Faction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="container">
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

    <div class="container mt-5">
        <h1>Create Faction</h1>
        <form action="/create_faction" method="POST">
            <!-- Faction Name -->
            <div class="mb-3">
                <label for="faction_name" class="form-label">Faction Name (required)</label>
                <input type="text" class="form-control" id="faction_name" name="faction_name" required>
            </div>
            <!-- League -->
            <div class="mb-3">
                <label for="league" class="form-label">League</label>
                <input type="text" class="form-control" id="league" name="league">
            </div>
            <!-- Members -->
            <div class="mb-3">
                <label for="members" class="form-label">Members (Read Only)</label>
                <input type="text" class="form-control" id="members" name="members" readonly>
            </div>
            <!-- Biography -->
            <div class="mb-3">
                <label for="biography" class="form-label">Biography</label>
                <textarea class="form-control" id="biography" name="biography" rows="4"></textarea>
            </div>
            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary">Create Faction</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
