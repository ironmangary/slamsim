<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create League</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="container">
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

    <div class="container mt-5">
        <h1>Create League</h1>
        <form action="/create_league" method="POST">
            <!-- Name -->
            <div class="mb-3">
                <label for="name" class="form-label">League Name (required)</label>
                <input type="text" class="form-control" id="name" name="name" maxlength="100" required>
            </div>
            <!-- Abbreviation -->
            <div class="mb-3">
                <label for="abbreviation" class="form-label">Abbreviation (required)</label>
                <input type="text" class="form-control" id="abbreviation" name="abbreviation" maxlength="10" required>
            </div>
            <!-- Status -->
            <div class="mb-3">
                <label for="status" class="form-label">Status</label>
                <select class="form-select" id="status" name="status">
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>
            <!-- Headquarters -->
            <div class="mb-3">
                <label for="headquarters" class="form-label">Headquarters</label>
                <input type="text" class="form-control" id="headquarters" name="headquarters" maxlength="100">
            </div>
            <!-- Owner/President -->
            <div class="mb-3">
                <label for="owner" class="form-label">Owner/President</label>
                <input type="text" class="form-control" id="owner" name="owner" maxlength="60">
            </div>
            <!-- Year Created -->
            <div class="mb-3">
                <label for="year_created" class="form-label">Year Created</label>
                <input type="number" class="form-control" id="year_created" name="year_created" min="1800" max="2099">
            </div>
            <!-- Biography -->
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="4"></textarea>
            </div>
            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary">Create League</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
